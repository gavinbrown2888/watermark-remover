<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>红途AI暗水印去除工具</title>
<style>
  :root {
    --primary: #1e3a5f;
    --primary-2: #2563eb;
    --accent: #059669;
    --danger: #dc2626;
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface-2: #f1f5f9;
    --text: #0f172a;
    --muted: #64748b;
    --border: #dbe3ee;
    --ring: rgba(37, 99, 235, 0.25);
    --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    --radius: 8px;
  }

  * { box-sizing: border-box; }
  html { color-scheme: light; }
  body {
    margin: 0;
    min-height: 100dvh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  button, input, select { font: inherit; }
  button { cursor: pointer; }
  button:disabled { cursor: not-allowed; }
  :focus-visible { outline: 3px solid var(--ring); outline-offset: 2px; }

  .app-shell { min-height: 100dvh; display: grid; grid-template-rows: auto 1fr; }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 24px;
    background: rgba(255, 255, 255, 0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .brand { min-width: 0; }
  .brand h1 { margin: 0; font-size: 18px; line-height: 1.2; letter-spacing: 0; }
  .brand p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
  .privacy-pill {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 6px 12px;
    border: 1px solid #b7e4d2;
    border-radius: 999px;
    color: #047857;
    background: #ecfdf5;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  .layout {
    display: grid;
    grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
    min-height: 0;
  }
  aside {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 18px;
    overflow: auto;
  }
  main { min-width: 0; padding: 20px; overflow: auto; }
  .stack { display: grid; gap: 16px; }
  .section { display: grid; gap: 10px; }
  .section-title {
    margin: 0;
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
  }
  .section-help {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
  }

  .upload-zone {
    display: grid;
    gap: 10px;
    place-items: center;
    min-height: 160px;
    padding: 18px;
    border: 1.5px dashed #9fb0c6;
    border-radius: var(--radius);
    background: #f8fbff;
    text-align: center;
    transition: border-color 180ms ease, background 180ms ease, box-shadow 180ms ease;
  }
  .upload-zone:hover,
  .upload-zone.drag-over {
    border-color: var(--primary-2);
    background: #eef6ff;
    box-shadow: 0 0 0 4px var(--ring);
  }
  .upload-zone.has-image { border-style: solid; border-color: #86c5ad; background: #f1fcf7; }
  .upload-mark {
    display: grid;
    place-items: center;
    width: 44px;
    height: 44px;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--primary);
    background: var(--surface);
    font-weight: 800;
  }
  .upload-zone strong { color: var(--primary-2); }
  .upload-zone small { color: var(--muted); }
  .thumb {
    max-width: 100%;
    max-height: 145px;
    object-fit: contain;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: #fff;
  }
  .file-meta { color: var(--muted); font-size: 12px; word-break: break-all; }
  .sr-file {
    position: absolute;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .preset-list { display: grid; gap: 8px; }
  .preset {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 70px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    text-align: left;
    transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
  }
  .preset:hover { border-color: #b5c4d8; background: #fbfdff; }
  .preset[aria-pressed="true"] {
    border-color: var(--primary-2);
    background: #eff6ff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
  }
  .preset-index {
    display: grid;
    place-items: center;
    width: 36px;
    height: 36px;
    border-radius: var(--radius);
    color: var(--primary);
    background: #eaf1fb;
    font-weight: 800;
  }
  .preset strong { display: block; font-size: 14px; }
  .preset span { display: block; color: var(--muted); font-size: 12px; }
  .preset .quality { color: #475569; font-size: 12px; font-weight: 600; }

  .advanced {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  .advanced summary {
    min-height: 46px;
    padding: 12px 14px;
    font-weight: 700;
    cursor: pointer;
  }
  .advanced-body {
    display: grid;
    gap: 12px;
    padding: 0 14px 14px;
  }
  .field { display: grid; gap: 6px; }
  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  label, .label { color: #334155; font-size: 13px; font-weight: 600; }
  input[type="range"] { width: 100%; accent-color: var(--primary-2); }
  select {
    min-height: 42px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
  }
  .value { color: var(--primary-2); font-size: 12px; font-weight: 800; font-variant-numeric: tabular-nums; }

  .actions { display: grid; gap: 10px; }
  .btn {
    min-height: 46px;
    border: 1px solid transparent;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-weight: 800;
    transition: transform 120ms ease, background 160ms ease, border-color 160ms ease, opacity 160ms ease;
  }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn-primary { background: var(--primary-2); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover:not(:disabled) { background: #047857; }
  .btn-secondary { border-color: var(--border); background: var(--surface); color: #1f2937; }
  .btn-secondary:hover:not(:disabled) { background: var(--surface-2); }
  .btn-danger { border-color: #fecaca; background: #fff1f2; color: #b91c1c; }
  .btn:disabled { opacity: 0.48; }
  .btn-small { min-height: 38px; padding: 7px 10px; font-size: 13px; }

  .workspace {
    display: grid;
    grid-template-rows: auto minmax(420px, 1fr);
    gap: 14px;
    min-height: calc(100dvh - 96px);
  }
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .tabs {
    display: inline-grid;
    grid-auto-flow: column;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  .tab {
    min-height: 38px;
    padding: 8px 14px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    font-weight: 800;
  }
  .tab[aria-selected="true"] { background: var(--primary); color: #fff; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 36px;
    color: var(--muted);
    font-size: 13px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
  }
  .dot.ready { background: var(--accent); }
  .dot.busy { background: #f59e0b; }

  .stage {
    position: relative;
    display: grid;
    place-items: center;
    min-height: 420px;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background:
      linear-gradient(45deg, #eef2f7 25%, transparent 25%),
      linear-gradient(-45deg, #eef2f7 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #eef2f7 75%),
      linear-gradient(-45deg, transparent 75%, #eef2f7 75%);
    background-size: 22px 22px;
    background-position: 0 0, 0 11px, 11px -11px, -11px 0;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .empty {
    max-width: 460px;
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.94);
    text-align: center;
  }
  .empty h2 { margin: 0 0 8px; font-size: 22px; }
  .empty p { margin: 0; color: var(--muted); }

  .compare-wrap,
  .edit-wrap {
    position: relative;
    display: none;
    max-width: 100%;
    max-height: 100%;
    user-select: none;
  }
  .compare-inner {
    position: relative;
    display: inline-block;
    max-width: 100%;
    max-height: 72dvh;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 72dvh;
    background: #fff;
  }
  .before-layer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    clip-path: inset(0 50% 0 0);
  }
  .slider {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 3px;
    background: #fff;
    box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.24), 0 8px 24px rgba(15, 23, 42, 0.28);
    touch-action: none;
    cursor: ew-resize;
  }
  .handle {
    position: absolute;
    top: 50%;
    left: 50%;
    display: grid;
    place-items: center;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    color: var(--primary);
    border: 1px solid var(--border);
    font-weight: 900;
  }
  .canvas-labels {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
  }
  .canvas-labels span {
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(15, 23, 42, 0.72);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
  }
  .edit-wrap { touch-action: none; }
  .edit-overlay {
    position: absolute;
    inset: 0;
    cursor: crosshair;
    background: transparent;
  }
  .edit-tools {
    display: none;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }
  .edit-tools .field { min-width: 180px; flex: 1; }

  .progress {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    place-items: center;
    padding: 20px;
    background: rgba(15, 23, 42, 0.42);
  }
  .progress-card {
    width: min(420px, 100%);
    padding: 20px;
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
  }
  .progress-card strong { display: block; margin-bottom: 10px; }
  .bar { height: 9px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
  .bar > div { width: 0%; height: 100%; background: var(--primary-2); transition: width 160ms ease; }
  .progress-card p { margin: 10px 0 0; color: var(--muted); font-size: 13px; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 20px;
    z-index: 60;
    transform: translateX(-50%);
    max-width: min(560px, calc(100% - 32px));
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #0f172a;
    color: #fff;
    font-size: 13px;
    box-shadow: var(--shadow);
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    aside { border-right: 0; border-bottom: 1px solid var(--border); }
    .workspace { min-height: auto; grid-template-rows: auto minmax(360px, 62dvh); }
  }
  @media (max-width: 560px) {
    .topbar { align-items: flex-start; flex-direction: column; padding: 12px 14px; }
    aside, main { padding: 14px; }
    .preset { grid-template-columns: 36px 1fr; }
    .preset .quality { grid-column: 2; }
    .tabs { width: 100%; grid-auto-flow: row; grid-template-columns: 1fr 1fr; }
    .tab { padding: 8px 10px; }
    .stage { min-height: 340px; padding: 10px; }
    .empty { padding: 20px 14px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="brand">
      <h1>红途AI暗水印去除工具</h1>
      <p>用于本人有权编辑图片的暗水印扰动、可见水印修复和导出。</p>
    </div>
    <span class="privacy-pill">全程浏览器本地处理</span>
  </header>

  <div class="layout">
    <aside>
      <div class="stack">
        <section class="section">
          <h2 class="section-title">1. 选择图片</h2>
          <label class="upload-zone" id="uploadZone" for="fileInput">
            <span class="upload-mark" aria-hidden="true">+</span>
            <span><strong>点击选择</strong>，或拖拽图片到这里</span>
            <small>支持 PNG、JPEG、WebP，也可以直接 Ctrl+V 粘贴</small>
          </label>
          <input class="sr-file" id="fileInput" type="file" accept="image/*">
        </section>

        <section class="section">
          <h2 class="section-title">2. 处理强度</h2>
          <p class="section-help">强度越高，越可能扰动隐形标记，但画质损失也越明显。</p>
          <div class="preset-list" id="presetList" role="group" aria-label="处理强度">
            <button class="preset" type="button" data-preset="light" aria-pressed="true">
              <span class="preset-index">1</span>
              <span><strong>轻量</strong><span>重新编码，剥离元数据</span></span>
              <span class="quality">画质高</span>
            </button>
            <button class="preset" type="button" data-preset="standard" aria-pressed="false">
              <span class="preset-index">2</span>
              <span><strong>标准</strong><span>压缩、轻模糊、微旋转</span></span>
              <span class="quality">推荐</span>
            </button>
            <button class="preset" type="button" data-preset="strong" aria-pressed="false">
              <span class="preset-index">3</span>
              <span><strong>强力</strong><span>增加 DCT 频域扰动</span></span>
              <span class="quality">有损</span>
            </button>
            <button class="preset" type="button" data-preset="extreme" aria-pressed="false">
              <span class="preset-index">4</span>
              <span><strong>极限</strong><span>增加小波细节衰减</span></span>
              <span class="quality">明显有损</span>
            </button>
          </div>
        </section>

        <details class="advanced">
          <summary>高级参数</summary>
          <div class="advanced-body">
            <div class="field">
              <div class="field-row"><label for="jpegQuality">JPEG 质量</label><span class="value" id="jpegQualityVal">84</span></div>
              <input id="jpegQuality" type="range" min="60" max="96" value="84">
            </div>
            <div class="field">
              <div class="field-row"><label for="blurRadius">细节柔化</label><span class="value" id="blurRadiusVal">0.8</span></div>
              <input id="blurRadius" type="range" min="0" max="2" step="0.1" value="0.8">
            </div>
            <div class="field">
              <div class="field-row"><label for="rotateAngle">微旋转角度</label><span class="value" id="rotateAngleVal">0.4°</span></div>
              <input id="rotateAngle" type="range" min="0" max="1.2" step="0.1" value="0.4">
            </div>
            <div class="field">
              <div class="field-row"><label for="frequencyStrength">频域扰动</label><span class="value" id="frequencyStrengthVal">48</span></div>
              <input id="frequencyStrength" type="range" min="0" max="80" value="48">
            </div>
            <div class="field">
              <label for="outputFormat">导出格式</label>
              <select id="outputFormat">
                <option value="image/png">PNG 无损</option>
                <option value="image/jpeg">JPEG 更小</option>
                <option value="image/webp">WebP 更小</option>
              </select>
            </div>
          </div>
        </details>

        <div class="actions">
          <button class="btn btn-primary" id="processBtn" type="button" disabled>处理图片</button>
          <button class="btn btn-accent" id="downloadBtn" type="button" disabled>下载结果</button>
          <button class="btn btn-secondary" id="resetBtn" type="button">清空重来</button>
        </div>

      </div>
    </aside>

    <main>
      <div class="workspace">
        <div class="toolbar">
          <div class="tabs" role="tablist" aria-label="查看模式">
            <button class="tab" id="compareTab" type="button" role="tab" aria-selected="true" data-mode="compare">前后对比</button>
            <button class="tab" id="repairTab" type="button" role="tab" aria-selected="false" data-mode="repair">明水印修复</button>
          </div>
          <div class="status" aria-live="polite"><span class="dot" id="statusDot"></span><span id="statusText">等待上传图片</span></div>
        </div>

        <div class="edit-tools" id="repairTools">
          <div class="field">
            <div class="field-row"><label for="brushSize">画笔大小</label><span class="value" id="brushSizeVal">28px</span></div>
            <input id="brushSize" type="range" min="8" max="80" step="2" value="28">
          </div>
          <button class="btn btn-small btn-primary" id="applyRepairBtn" type="button" disabled>执行修复</button>
          <button class="btn btn-small btn-secondary" id="undoBtn" type="button" disabled>撤销</button>
          <button class="btn btn-small btn-danger" id="clearMaskBtn" type="button" disabled>清除标记</button>
        </div>

        <section class="stage" aria-label="图片预览区">
          <div class="empty" id="emptyState">
            <h2>把图片放进来，工具会在本地完成处理</h2>
            <p>上传后会自动生成预览。处理完成后可拖动分割线检查细节，也可以切到明水印修复模式手动涂抹。</p>
          </div>

          <div class="compare-wrap" id="compareWrap">
            <div class="compare-inner" id="compareInner">
              <canvas id="afterCanvas"></canvas>
              <div class="before-layer" id="beforeLayer"><canvas id="beforeCanvas"></canvas></div>
              <div class="slider" id="compareSlider" role="slider" aria-label="对比滑块" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" tabindex="0">
                <span class="handle" aria-hidden="true">↔</span>
              </div>
              <div class="canvas-labels"><span>原图</span><span>处理后</span></div>
            </div>
          </div>

          <div class="edit-wrap" id="editWrap">
            <canvas id="editCanvas"></canvas>
            <canvas class="edit-overlay" id="maskCanvas" aria-label="水印标记画布"></canvas>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>

<div class="progress" id="progressOverlay" role="status" aria-live="polite">
  <div class="progress-card">
    <strong id="progressTitle">正在处理图片</strong>
    <div class="bar"><div id="progressBar"></div></div>
    <p id="progressText">准备中...</p>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const els = {
    uploadZone: $('uploadZone'), fileInput: $('fileInput'),
    processBtn: $('processBtn'), downloadBtn: $('downloadBtn'), resetBtn: $('resetBtn'),
    emptyState: $('emptyState'), compareWrap: $('compareWrap'), editWrap: $('editWrap'),
    beforeCanvas: $('beforeCanvas'), afterCanvas: $('afterCanvas'), beforeLayer: $('beforeLayer'),
    compareSlider: $('compareSlider'), compareInner: $('compareInner'),
    editCanvas: $('editCanvas'), maskCanvas: $('maskCanvas'), repairTools: $('repairTools'),
    applyRepairBtn: $('applyRepairBtn'), undoBtn: $('undoBtn'), clearMaskBtn: $('clearMaskBtn'),
    brushSize: $('brushSize'), brushSizeVal: $('brushSizeVal'),
    statusDot: $('statusDot'), statusText: $('statusText'),
    jpegQuality: $('jpegQuality'), blurRadius: $('blurRadius'), rotateAngle: $('rotateAngle'), frequencyStrength: $('frequencyStrength'), outputFormat: $('outputFormat'),
    jpegQualityVal: $('jpegQualityVal'), blurRadiusVal: $('blurRadiusVal'), rotateAngleVal: $('rotateAngleVal'), frequencyStrengthVal: $('frequencyStrengthVal'),
    progressOverlay: $('progressOverlay'), progressTitle: $('progressTitle'), progressBar: $('progressBar'), progressText: $('progressText')
  };

  const presetDefaults = {
    light: { jpeg: 88, blur: 0, rotate: 0, freq: 0 },
    standard: { jpeg: 84, blur: 0.8, rotate: 0.4, freq: 24 },
    strong: { jpeg: 80, blur: 1.0, rotate: 0.5, freq: 52 },
    extreme: { jpeg: 76, blur: 1.2, rotate: 0.7, freq: 74 }
  };

  let originalImageData = null;
  let processedImageData = null;
  let currentFileName = 'processed-image';
  let activePreset = 'light';
  let activeMode = 'compare';
  let mask = null;
  let isPainting = false;
  let undoStack = [];
  let lastToast = null;

  function setStatus(text, state = '') {
    els.statusText.textContent = text;
    els.statusDot.className = 'dot ' + state;
  }

  function toast(message) {
    if (lastToast) lastToast.remove();
    const node = document.createElement('div');
    node.className = 'toast';
    node.textContent = message;
    document.body.appendChild(node);
    lastToast = node;
    setTimeout(() => node.remove(), 2800);
  }

  function updateRangeLabels() {
    els.jpegQualityVal.textContent = els.jpegQuality.value;
    els.blurRadiusVal.textContent = Number(els.blurRadius.value).toFixed(1);
    els.rotateAngleVal.textContent = Number(els.rotateAngle.value).toFixed(1) + '°';
    els.frequencyStrengthVal.textContent = els.frequencyStrength.value;
    els.brushSizeVal.textContent = els.brushSize.value + 'px';
  }

  ['jpegQuality', 'blurRadius', 'rotateAngle', 'frequencyStrength', 'brushSize'].forEach(id => {
    els[id].addEventListener('input', updateRangeLabels);
  });
  updateRangeLabels();

  document.querySelectorAll('.preset').forEach(btn => {
    btn.addEventListener('click', () => {
      activePreset = btn.dataset.preset;
      document.querySelectorAll('.preset').forEach(item => item.setAttribute('aria-pressed', String(item === btn)));
      const next = presetDefaults[activePreset];
      els.jpegQuality.value = next.jpeg;
      els.blurRadius.value = next.blur;
      els.rotateAngle.value = next.rotate;
      els.frequencyStrength.value = next.freq;
      updateRangeLabels();
    });
  });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchMode(tab.dataset.mode));
  });

  function switchMode(mode) {
    activeMode = mode;
    document.querySelectorAll('.tab').forEach(tab => tab.setAttribute('aria-selected', String(tab.dataset.mode === mode)));
    els.compareWrap.style.display = mode === 'compare' && processedImageData ? 'block' : 'none';
    els.editWrap.style.display = mode === 'repair' && processedImageData ? 'block' : 'none';
    els.repairTools.style.display = mode === 'repair' && processedImageData ? 'flex' : 'none';
    if (mode === 'repair' && processedImageData) drawEditCanvas();
  }

  function readFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      toast('请选择图片文件。');
      return;
    }
    currentFileName = file.name.replace(/\.[^.]+$/, '') || 'processed-image';
    const reader = new FileReader();
    reader.onload = () => loadImage(reader.result, file);
    reader.readAsDataURL(file);
  }

  function loadImage(src, file) {
    const img = new Image();
    img.onload = () => {
      const maxSide = 4200;
      const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.max(1, Math.round(img.naturalWidth * scale));
      const h = Math.max(1, Math.round(img.naturalHeight * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0, w, h);
      originalImageData = ctx.getImageData(0, 0, w, h);
      processedImageData = null;
      mask = null;
      undoStack = [];
      els.processBtn.disabled = false;
      els.downloadBtn.disabled = true;
      els.emptyState.style.display = 'none';
      els.compareWrap.style.display = 'none';
      els.editWrap.style.display = 'none';
      els.repairTools.style.display = 'none';
      els.uploadZone.classList.add('has-image');
      els.uploadZone.innerHTML = `
        <img class="thumb" alt="已选择图片预览" src="${src}">
        <span class="file-meta">${file.name} · ${w} × ${h}${scale < 1 ? ' · 已为浏览器处理缩放' : ''}</span>
      `;
      setStatus('图片已载入，可以开始处理', 'ready');
      processImage();
    };
    img.onerror = () => toast('图片读取失败，请换一张图片试试。');
    img.src = src;
  }

  els.fileInput.addEventListener('change', (event) => readFile(event.target.files[0]));
  els.uploadZone.addEventListener('dragover', (event) => {
    event.preventDefault();
    els.uploadZone.classList.add('drag-over');
  });
  els.uploadZone.addEventListener('dragleave', () => els.uploadZone.classList.remove('drag-over'));
  els.uploadZone.addEventListener('drop', (event) => {
    event.preventDefault();
    els.uploadZone.classList.remove('drag-over');
    readFile(event.dataTransfer.files[0]);
  });
  document.addEventListener('paste', (event) => {
    const item = [...event.clipboardData.items].find(i => i.type.startsWith('image/'));
    if (item) readFile(item.getAsFile());
  });

  function showProgress(title, text, pct) {
    els.progressOverlay.style.display = 'grid';
    els.progressTitle.textContent = title;
    els.progressText.textContent = text;
    els.progressBar.style.width = pct + '%';
  }
  function hideProgress() { els.progressOverlay.style.display = 'none'; }
  const frame = () => new Promise(resolve => requestAnimationFrame(resolve));

  async function processImage() {
    if (!originalImageData) return;
    els.processBtn.disabled = true;
    els.downloadBtn.disabled = true;
    setStatus('正在处理图片', 'busy');
    showProgress('正在处理图片', '复制原始像素', 8);
    await frame();

    try {
      let data = cloneImageData(originalImageData);
      const q = Number(els.jpegQuality.value) / 100;
      const blur = Number(els.blurRadius.value);
      const rotate = Number(els.rotateAngle.value);
      const freq = Number(els.frequencyStrength.value);

      showProgress('正在处理图片', '重新编码并剥离元数据', 24);
      data = await recompress(data, q);
      await frame();

      if (blur > 0) {
        showProgress('正在处理图片', '柔化细节纹理', 44);
        data = gaussianBlur(data, blur);
        await frame();
      }

      if (rotate > 0) {
        showProgress('正在处理图片', '执行微旋转扰动', 60);
        data = microRotate(data, rotate);
        await frame();
      }

      if (freq > 0) {
        showProgress('正在处理图片', '处理频域细节', 78);
        data = frequencyAttenuation(data, freq);
        await frame();
      }

      processedImageData = data;
      showProgress('正在处理图片', '渲染预览', 94);
      renderCompare();
      undoStack = [];
      mask = null;
      els.downloadBtn.disabled = false;
      els.applyRepairBtn.disabled = true;
      els.clearMaskBtn.disabled = true;
      els.undoBtn.disabled = true;
      switchMode(activeMode);
      setStatus('处理完成，可对比或下载', 'ready');
      toast('处理完成。拖动分割线可以查看前后差异。');
    } catch (error) {
      console.error(error);
      setStatus('处理失败', '');
      toast('处理失败：' + error.message);
    } finally {
      hideProgress();
      els.processBtn.disabled = false;
    }
  }

  els.processBtn.addEventListener('click', processImage);

  function cloneImageData(data) {
    return new ImageData(new Uint8ClampedArray(data.data), data.width, data.height);
  }

  function recompress(imageData, quality) {
    return new Promise((resolve, reject) => {
      const canvas = toCanvas(imageData);
      canvas.toBlob(blob => {
        if (!blob) {
          reject(new Error('浏览器无法重新编码图片'));
          return;
        }
        const img = new Image();
        const url = URL.createObjectURL(blob);
        img.onload = () => {
          const out = document.createElement('canvas');
          out.width = imageData.width;
          out.height = imageData.height;
          const ctx = out.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          resolve(ctx.getImageData(0, 0, out.width, out.height));
        };
        img.onerror = () => reject(new Error('重新编码后读取失败'));
        img.src = url;
      }, 'image/jpeg', quality);
    });
  }

  function toCanvas(imageData) {
    const canvas = document.createElement('canvas');
    canvas.width = imageData.width;
    canvas.height = imageData.height;
    canvas.getContext('2d').putImageData(imageData, 0, 0);
    return canvas;
  }

  function gaussianBlur(imageData, radius) {
    const w = imageData.width, h = imageData.height, src = imageData.data;
    const dst = new Uint8ClampedArray(src.length);
    const tmp = new Uint8ClampedArray(src.length);
    const size = Math.max(3, Math.ceil(radius * 3) * 2 + 1);
    const half = Math.floor(size / 2);
    const kernel = [];
    let sum = 0;
    for (let i = 0; i < size; i++) {
      const x = i - half;
      const v = Math.exp(-(x * x) / (2 * radius * radius));
      kernel.push(v);
      sum += v;
    }
    for (let i = 0; i < size; i++) kernel[i] /= sum;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const out = (y * w + x) * 4;
        for (let c = 0; c < 4; c++) {
          let acc = 0;
          for (let k = 0; k < size; k++) {
            const sx = Math.min(w - 1, Math.max(0, x + k - half));
            acc += src[(y * w + sx) * 4 + c] * kernel[k];
          }
          tmp[out + c] = acc;
        }
      }
    }
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const out = (y * w + x) * 4;
        for (let c = 0; c < 4; c++) {
          let acc = 0;
          for (let k = 0; k < size; k++) {
            const sy = Math.min(h - 1, Math.max(0, y + k - half));
            acc += tmp[(sy * w + x) * 4 + c] * kernel[k];
          }
          dst[out + c] = acc;
        }
      }
    }
    for (let i = 0; i < src.length; i += 4) {
      for (let c = 0; c < 3; c++) {
        dst[i + c] = clamp(src[i + c] + (src[i + c] - dst[i + c]) * 0.18);
      }
      dst[i + 3] = src[i + 3];
    }
    return new ImageData(dst, w, h);
  }

  function microRotate(imageData, angleDeg) {
    const src = toCanvas(imageData);
    const w = imageData.width, h = imageData.height;
    const rad = angleDeg * Math.PI / 180;
    const expW = Math.ceil(Math.abs(w * Math.cos(rad)) + Math.abs(h * Math.sin(rad)));
    const expH = Math.ceil(Math.abs(w * Math.sin(rad)) + Math.abs(h * Math.cos(rad)));
    const tmp = document.createElement('canvas');
    tmp.width = expW;
    tmp.height = expH;
    const tctx = tmp.getContext('2d');
    tctx.fillStyle = '#ffffff';
    tctx.fillRect(0, 0, expW, expH);
    tctx.translate(expW / 2, expH / 2);
    tctx.rotate(rad);
    tctx.drawImage(src, -w / 2, -h / 2);
    const out = document.createElement('canvas');
    out.width = w;
    out.height = h;
    const octx = out.getContext('2d', { willReadFrequently: true });
    octx.drawImage(tmp, (expW - w) / 2, (expH - h) / 2, w, h, 0, 0, w, h);
    return octx.getImageData(0, 0, w, h);
  }

  function frequencyAttenuation(imageData, strength) {
    const w = imageData.width, h = imageData.height, src = imageData.data;
    const out = new Uint8ClampedArray(src);
    const block = 8;
    const atten = 1 - strength / 140;
    for (let by = 0; by + block <= h; by += block) {
      for (let bx = 0; bx + block <= w; bx += block) {
        let avgR = 0, avgG = 0, avgB = 0;
        for (let y = 0; y < block; y++) {
          for (let x = 0; x < block; x++) {
            const idx = ((by + y) * w + bx + x) * 4;
            avgR += src[idx]; avgG += src[idx + 1]; avgB += src[idx + 2];
          }
        }
        avgR /= 64; avgG /= 64; avgB /= 64;
        for (let y = 0; y < block; y++) {
          for (let x = 0; x < block; x++) {
            const idx = ((by + y) * w + bx + x) * 4;
            const edgeWeight = ((x === 0 || y === 0 || x === 7 || y === 7) ? 0.35 : 1);
            out[idx] = clamp(avgR + (src[idx] - avgR) * (atten + (1 - atten) * (1 - edgeWeight)));
            out[idx + 1] = clamp(avgG + (src[idx + 1] - avgG) * (atten + (1 - atten) * (1 - edgeWeight)));
            out[idx + 2] = clamp(avgB + (src[idx + 2] - avgB) * (atten + (1 - atten) * (1 - edgeWeight)));
          }
        }
      }
    }
    if (strength > 55) {
      return waveletLite(new ImageData(out, w, h), (strength - 55) / 100);
    }
    return new ImageData(out, w, h);
  }

  function waveletLite(imageData, amount) {
    const w = imageData.width, h = imageData.height, src = imageData.data;
    const out = new Uint8ClampedArray(src);
    for (let y = 1; y < h - 1; y += 2) {
      for (let x = 1; x < w - 1; x += 2) {
        for (let c = 0; c < 3; c++) {
          const idx = (y * w + x) * 4 + c;
          const avg = (
            src[((y - 1) * w + x) * 4 + c] +
            src[((y + 1) * w + x) * 4 + c] +
            src[(y * w + x - 1) * 4 + c] +
            src[(y * w + x + 1) * 4 + c]
          ) / 4;
          out[idx] = clamp(src[idx] * (1 - amount) + avg * amount);
        }
      }
    }
    return new ImageData(out, w, h);
  }

  function renderCompare() {
    if (!processedImageData) return;
    drawCanvas(els.beforeCanvas, originalImageData);
    drawCanvas(els.afterCanvas, processedImageData);
    els.emptyState.style.display = 'none';
    els.compareWrap.style.display = 'block';
    setSlider(50);
  }

  function drawCanvas(canvas, imageData) {
    canvas.width = imageData.width;
    canvas.height = imageData.height;
    canvas.getContext('2d').putImageData(imageData, 0, 0);
  }

  function setSlider(pct) {
    pct = Math.max(0, Math.min(100, pct));
    els.beforeLayer.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    els.compareSlider.style.left = pct + '%';
    els.compareSlider.setAttribute('aria-valuenow', Math.round(pct));
  }

  let dragging = false;
  function sliderFromEvent(event) {
    const point = event.touches ? event.touches[0] : event;
    const rect = els.compareInner.getBoundingClientRect();
    setSlider(((point.clientX - rect.left) / rect.width) * 100);
  }
  els.compareSlider.addEventListener('mousedown', event => { dragging = true; event.preventDefault(); sliderFromEvent(event); });
  els.compareSlider.addEventListener('touchstart', event => { dragging = true; event.preventDefault(); sliderFromEvent(event); }, { passive: false });
  document.addEventListener('mousemove', event => { if (dragging) sliderFromEvent(event); });
  document.addEventListener('touchmove', event => { if (dragging) { event.preventDefault(); sliderFromEvent(event); } }, { passive: false });
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });
  els.compareSlider.addEventListener('keydown', event => {
    const current = Number(els.compareSlider.getAttribute('aria-valuenow'));
    if (event.key === 'ArrowLeft') setSlider(current - 5);
    if (event.key === 'ArrowRight') setSlider(current + 5);
  });

  function drawEditCanvas() {
    drawCanvas(els.editCanvas, processedImageData);
    els.maskCanvas.width = processedImageData.width;
    els.maskCanvas.height = processedImageData.height;
    els.maskCanvas.style.width = els.editCanvas.clientWidth + 'px';
    els.maskCanvas.style.height = els.editCanvas.clientHeight + 'px';
    drawMaskOverlay();
  }

  function ensureMask() {
    if (!processedImageData) return;
    if (!mask || mask.length !== processedImageData.width * processedImageData.height) {
      mask = new Uint8Array(processedImageData.width * processedImageData.height);
    }
  }

  function canvasPoint(event) {
    const point = event.touches ? event.touches[0] : event;
    const rect = els.maskCanvas.getBoundingClientRect();
    return {
      x: Math.round((point.clientX - rect.left) * (els.maskCanvas.width / rect.width)),
      y: Math.round((point.clientY - rect.top) * (els.maskCanvas.height / rect.height))
    };
  }

  function paint(event) {
    ensureMask();
    const { x, y } = canvasPoint(event);
    const r = Number(els.brushSize.value);
    const w = els.maskCanvas.width, h = els.maskCanvas.height;
    for (let py = Math.max(0, y - r); py <= Math.min(h - 1, y + r); py++) {
      for (let px = Math.max(0, x - r); px <= Math.min(w - 1, x + r); px++) {
        const dx = px - x, dy = py - y;
        if (dx * dx + dy * dy <= r * r) mask[py * w + px] = 1;
      }
    }
    drawMaskOverlay();
    els.applyRepairBtn.disabled = false;
    els.clearMaskBtn.disabled = false;
  }

  function drawMaskOverlay() {
    const ctx = els.maskCanvas.getContext('2d');
    ctx.clearRect(0, 0, els.maskCanvas.width, els.maskCanvas.height);
    if (!mask) return;
    const image = ctx.createImageData(els.maskCanvas.width, els.maskCanvas.height);
    for (let i = 0; i < mask.length; i++) {
      if (!mask[i]) continue;
      const idx = i * 4;
      image.data[idx] = 37;
      image.data[idx + 1] = 99;
      image.data[idx + 2] = 235;
      image.data[idx + 3] = 112;
    }
    ctx.putImageData(image, 0, 0);
  }

  els.maskCanvas.addEventListener('mousedown', event => { if (activeMode !== 'repair') return; isPainting = true; paint(event); });
  els.maskCanvas.addEventListener('mousemove', event => { if (isPainting) paint(event); });
  document.addEventListener('mouseup', () => { isPainting = false; });
  els.maskCanvas.addEventListener('touchstart', event => { if (activeMode !== 'repair') return; event.preventDefault(); isPainting = true; paint(event); }, { passive: false });
  els.maskCanvas.addEventListener('touchmove', event => { if (isPainting) { event.preventDefault(); paint(event); } }, { passive: false });
  document.addEventListener('touchend', () => { isPainting = false; });

  els.clearMaskBtn.addEventListener('click', () => {
    mask = null;
    drawMaskOverlay();
    els.applyRepairBtn.disabled = true;
    els.clearMaskBtn.disabled = true;
  });

  els.applyRepairBtn.addEventListener('click', () => {
    if (!processedImageData || !mask) return;
    undoStack.push(cloneImageData(processedImageData));
    processedImageData = repairMaskedArea(processedImageData, mask);
    mask = null;
    drawEditCanvas();
    renderCompare();
    switchMode('repair');
    els.applyRepairBtn.disabled = true;
    els.clearMaskBtn.disabled = true;
    els.undoBtn.disabled = false;
    els.downloadBtn.disabled = false;
    setStatus('修复已应用，可继续涂抹或下载', 'ready');
    toast('已应用局部修复。');
  });

  els.undoBtn.addEventListener('click', () => {
    if (!undoStack.length) return;
    processedImageData = undoStack.pop();
    drawEditCanvas();
    renderCompare();
    switchMode('repair');
    els.undoBtn.disabled = !undoStack.length;
    toast('已撤销上一步修复。');
  });

  function repairMaskedArea(imageData, maskData) {
    const w = imageData.width, h = imageData.height;
    const out = new Uint8ClampedArray(imageData.data);
    const source = new Uint8ClampedArray(imageData.data);
    for (let pass = 0; pass < 24; pass++) {
      let changed = 0;
      const snapshot = new Uint8ClampedArray(out);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const p = y * w + x;
          if (!maskData[p]) continue;
          let count = 0, r = 0, g = 0, b = 0;
          for (let oy = -2; oy <= 2; oy++) {
            for (let ox = -2; ox <= 2; ox++) {
              const nx = x + ox, ny = y + oy;
              if (nx < 0 || ny < 0 || nx >= w || ny >= h || (ox === 0 && oy === 0)) continue;
              const np = ny * w + nx;
              if (maskData[np] && pass < 10) continue;
              const idx = np * 4;
              r += snapshot[idx]; g += snapshot[idx + 1]; b += snapshot[idx + 2];
              count++;
            }
          }
          if (count) {
            const idx = p * 4;
            const keepTexture = pass > 12 ? 0.08 : 0;
            out[idx] = clamp((r / count) * (1 - keepTexture) + source[idx] * keepTexture);
            out[idx + 1] = clamp((g / count) * (1 - keepTexture) + source[idx + 1] * keepTexture);
            out[idx + 2] = clamp((b / count) * (1 - keepTexture) + source[idx + 2] * keepTexture);
            changed++;
          }
        }
      }
      if (!changed) break;
    }
    return new ImageData(out, w, h);
  }

  els.downloadBtn.addEventListener('click', () => {
    if (!processedImageData) return;
    const canvas = toCanvas(processedImageData);
    const format = els.outputFormat.value;
    const quality = Number(els.jpegQuality.value) / 100;
    const ext = format === 'image/png' ? 'png' : format === 'image/webp' ? 'webp' : 'jpg';
    canvas.toBlob(blob => {
      if (!blob) {
        toast('导出失败，请换一种格式。');
        return;
      }
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${currentFileName}_processed.${ext}`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      toast('下载已开始。');
    }, format, quality);
  });

  els.resetBtn.addEventListener('click', () => {
    originalImageData = null;
    processedImageData = null;
    mask = null;
    undoStack = [];
    els.fileInput.value = '';
    els.uploadZone.classList.remove('has-image');
    els.uploadZone.innerHTML = `
      <span class="upload-mark" aria-hidden="true">+</span>
      <span><strong>点击选择</strong>，或拖拽图片到这里</span>
      <small>支持 PNG、JPEG、WebP，也可以直接 Ctrl+V 粘贴</small>
    `;
    els.processBtn.disabled = true;
    els.downloadBtn.disabled = true;
    els.applyRepairBtn.disabled = true;
    els.undoBtn.disabled = true;
    els.clearMaskBtn.disabled = true;
    els.emptyState.style.display = 'block';
    els.compareWrap.style.display = 'none';
    els.editWrap.style.display = 'none';
    els.repairTools.style.display = 'none';
    setStatus('等待上传图片');
  });

  window.addEventListener('resize', () => {
    if (activeMode === 'repair' && processedImageData) drawEditCanvas();
  });

  function clamp(value) { return Math.max(0, Math.min(255, Math.round(value))); }
})();
</script>
</body>
</html>
